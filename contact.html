<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Furkan Deniz Albaylar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #2997ff;
            --font-main: 'Outfit', sans-serif;
            --font-sub: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sub);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Reusing the mesh gradient style */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #08080a, #000);
        }

        .mesh-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
        }
        .orb-1 { width: 50vw; height: 50vw; background: var(--accent); top: -10%; left: -10%; }

        .contact-container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 { font-family: var(--font-main); font-size: 2.5rem; margin-bottom: 10px; }
        p { color: var(--text-secondary); margin-bottom: 40px; }

        .form-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, textarea {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-family: var(--font-sub);
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }
        button:hover { transform: translateY(-3px); background: #1a85ff; }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="mesh-orb orb-1"></div>
    </div>

    <div class="contact-container">
        <h1>Direct Inquiry</h1>
        <p>Fill out the form below and I'll get back to you shortly.</p>
        
        <form action="https://formsubmit.co/furkandenizalbaylar@gmail.com" method="POST">
            <!-- FormSubmit Configurations -->
            <input type="hidden" name="_next" value="https://albaylar.github.io/index.html">
            <input type="hidden" name="_subject" value="New Classic Contact Inquiry">
            
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Your Email</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="5" placeholder="How can I help you?" required></textarea>
            </div>
            
            <button type="submit">Send Message</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
