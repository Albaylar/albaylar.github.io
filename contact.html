<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Furkan Deniz Albaylar</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #2997ff;
            --font-main: 'Outfit', sans-serif;
            --font-sub: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sub);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Reusing the mesh gradient style */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #08080a, #000);
        }

        .mesh-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
        }
        .orb-1 { width: 50vw; height: 50vw; background: var(--accent); top: -10%; left: -10%; }

        .contact-container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 { font-family: var(--font-main); font-size: 2.5rem; margin-bottom: 10px; }
        p { color: var(--text-secondary); margin-bottom: 40px; }

        .form-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, textarea {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-family: var(--font-sub);
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }
        button:hover { transform: translateY(-3px); background: #1a85ff; }

        .or-divider {
            display: flex;
            align-items: center;
            margin: 25px 0 20px;
            gap: 15px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .call-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: background 0.3s, border-color 0.3s, transform 0.3s;
        }
        .call-btn:hover {
            background: rgba(41,151,255,0.1);
            border-color: var(--accent);
            transform: translateY(-3px);
        }
        .call-btn i { color: var(--accent); }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #fff; }
    </style>

    <!-- Google tag (gtag.js) - Google Ads: AW-18130833656 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18130833656"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'AW-18130833656', {'allow_enhanced_conversions': true});
    </script>
    <!-- Event snippet for Tıkla ve ara conversion -->
    <script>
        function gtag_report_conversion(url) {
            var callback = function () {
                if (typeof(url) != 'undefined') {
                    window.location = url;
                }
            };
            gtag('event', 'conversion', {
                'send_to': 'AW-18130833656/GGfZCJ7onqYcEPihusVD',
                'value': 1.0,
                'currency': 'EUR',
                'event_callback': callback
            });
            return false;
        }
    </script>
</head>
<body>
    <div class="bg-layer">
        <div class="mesh-orb orb-1"></div>
    </div>

    <div class="contact-container">
        <h1 data-i18n="contactTitle">Direct Inquiry</h1>
        <p data-i18n="contactSub">Fill out the form below and I'll get back to you shortly.</p>
        
        <form action="https://formsubmit.co/furkandenizalbaylar@gmail.com" method="POST">
            <!-- FormSubmit Configurations -->
            <input type="hidden" name="_next" value="https://albaylar.github.io/index.html">
            <input type="hidden" name="_subject" value="New Classic Contact Inquiry">
            
            <div class="form-group">
                <label data-i18n="labelName">Your Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label data-i18n="labelEmail">Your Email</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label data-i18n="labelMsg">Message</label>
                <textarea name="message" rows="5" placeholder="How can I help you?" required></textarea>
            </div>
            
            <button type="submit" data-i18n="btnSend">Send Message</button>
        </form>

        <div class="or-divider"><span data-i18n="orDivider">or</span></div>
        <a href="tel:+491634773582" class="call-btn" onclick="return gtag_report_conversion('tel:+491634773582')">
            <i class="fas fa-phone"></i>
            <span data-i18n="btnCall">Call Directly</span>
        </a>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> <span data-i18n="btnBack">Back to Home</span></a>
    </div>

    <script>
        const translations = {
            en: {
                contactTitle: "Direct Inquiry",
                contactSub: "Fill out the form below and I'll get back to you shortly.",
                labelName: "Your Name",
                labelEmail: "Your Email",
                labelMsg: "Message",
                btnSend: "Send Message",
                btnBack: "Back to Home",
                orDivider: "or",
                btnCall: "Call Directly"
            },
            de: {
                contactTitle: "Direktanfrage",
                contactSub: "Füllen Sie das Formular aus und ich melde mich in Kürze bei Ihnen.",
                labelName: "Ihr Name",
                labelEmail: "Ihre E-Mail",
                labelMsg: "Nachricht",
                btnSend: "Nachricht senden",
                btnBack: "Zurück zur Startseite",
                orDivider: "oder",
                btnCall: "Direkt anrufen"
            },
            tr: {
                contactTitle: "Doğrudan Talep",
                contactSub: "Aşağıdaki formu doldurun, en kısa sürede size dönüş yapacağım.",
                labelName: "Adınız",
                labelEmail: "E-posta Adresiniz",
                labelMsg: "Mesajınız",
                btnSend: "Mesaj Gönder",
                btnBack: "Ana Sayfaya Dön",
                orDivider: "veya",
                btnCall: "Doğrudan Ara"
            },
            fr: {
                contactTitle: "Demande Directe",
                contactSub: "Remplissez le formulaire ci-dessous et je vous recontacterai sous peu.",
                labelName: "Votre Nom",
                labelEmail: "Votre Email",
                labelMsg: "Message",
                btnSend: "Envoyer le message",
                btnBack: "Retour à l'accueil",
                orDivider: "ou",
                btnCall: "Appeler directement"
            },
            es: {
                contactTitle: "Consulta Directa",
                contactSub: "Completa el formulario a continuación y me pondré en contacto contigo pronto.",
                labelName: "Tu Nombre",
                labelEmail: "Tu Email",
                labelMsg: "Mensaje",
                btnSend: "Enviar Mensaje",
                btnBack: "Volver al Inicio",
                orDivider: "o",
                btnCall: "Llamar directamente"
            },
            it: {
                contactTitle: "Richiesta Diretta",
                contactSub: "Compila il modulo sottostante e ti ricontatterò al più presto.",
                labelName: "Il Tuo Nome",
                labelEmail: "La Tua Email",
                labelMsg: "Messaggio",
                btnSend: "Invia Messaggio",
                btnBack: "Torna alla Home",
                orDivider: "o",
                btnCall: "Chiama direttamente"
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
        }

        const savedLang = localStorage.getItem('preferredLang') || 'en';
        setLanguage(savedLang);
    </script>
</body>
</html>
